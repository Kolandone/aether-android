name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download Aether binaries
        run: |
          set -e
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64

          VERSION="v1.2.0"
          BASE_URL="https://github.com/CluvexStudio/Aether/releases/download/${VERSION}"

          for ARCH in arm64 armv7 x86_64; do
            case $ARCH in
              arm64)   ABI="arm64-v8a" ;;
              armv7)   ABI="armeabi-v7a" ;;
              x86_64)  ABI="x86_64" ;;
            esac
            echo "Downloading Aether ${ARCH}..."
            curl -sL "${BASE_URL}/aether-android-${ARCH}.tar.gz" -o /tmp/aether.tar.gz
            mkdir -p /tmp/aether && tar xzf /tmp/aether.tar.gz -C /tmp/aether
            BIN=$(find /tmp/aether -type f ! -name "*.sha256" | head -1)
            cp "$BIN" "app/src/main/jniLibs/${ABI}/libaether.so"
            chmod 755 "app/src/main/jniLibs/${ABI}/libaether.so"
            echo "  ${ABI}: $(wc -c < "app/src/main/jniLibs/${ABI}/libaether.so") bytes"
            rm -rf /tmp/aether /tmp/aether.tar.gz
          done

      - name: Download tun2socks for VPN mode
        run: |
          set -e
          # Download tun2socks from MahsaNG repo using GitHub API (not raw)
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            echo "Downloading tun2socks for ${ABI}..."
            # Use GitHub API to get the file content
            curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/GFW-knocker/MahsaNG/contents/V2rayNG/app/libs/${ABI}/libtun2socks.so" \
              -o "app/src/main/jniLibs/${ABI}/libtun2socks.so" || true
            
            if [ -f "app/src/main/jniLibs/${ABI}/libtun2socks.so" ]; then
              chmod 755 "app/src/main/jniLibs/${ABI}/libtun2socks.so"
              SIZE=$(wc -c < "app/src/main/jniLibs/${ABI}/libtun2socks.so")
              echo "  ${ABI}: ${SIZE} bytes"
              # Validate it's a real ELF binary (starts with \x7fELF)
              HEADER=$(xxd -l 4 -p "app/src/main/jniLibs/${ABI}/libtun2socks.so" 2>/dev/null || echo "bad")
              if [ "$HEADER" != "7f454c46" ]; then
                echo "  WARNING: Not a valid ELF binary, removing"
                rm -f "app/src/main/jniLibs/${ABI}/libtun2socks.so"
              fi
            else
              echo "  FAILED to download"
            fi
          done

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: aether-android
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
