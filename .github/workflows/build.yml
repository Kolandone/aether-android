name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }

      - name: Download Aether binaries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64

          echo "arm64..."
          curl -sL "https://github.com/CluvexStudio/Aether/releases/download/v1.2.0/aether-android-arm64.tar.gz" -o /tmp/a.tar.gz
          mkdir -p /tmp/a && tar xzf /tmp/a.tar.gz -C /tmp/a
          find /tmp/a -type f ! -name "*.sha256" | head -1 | xargs -I{} cp {} app/src/main/jniLibs/arm64-v8a/libaether.so
          chmod 755 app/src/main/jniLibs/arm64-v8a/libaether.so
          echo "  arm64: $(wc -c < app/src/main/jniLibs/arm64-v8a/libaether.so) bytes"
          rm -rf /tmp/a /tmp/a.tar.gz

          echo "armv7..."
          curl -sL "https://github.com/CluvexStudio/Aether/releases/download/v1.2.0/aether-android-armv7.tar.gz" -o /tmp/a.tar.gz
          mkdir -p /tmp/a && tar xzf /tmp/a.tar.gz -C /tmp/a
          find /tmp/a -type f ! -name "*.sha256" | head -1 | xargs -I{} cp {} app/src/main/jniLibs/armeabi-v7a/libaether.so
          chmod 755 app/src/main/jniLibs/armeabi-v7a/libaether.so
          echo "  armv7: $(wc -c < app/src/main/jniLibs/armeabi-v7a/libaether.so) bytes"
          rm -rf /tmp/a /tmp/a.tar.gz

          echo "x86_64..."
          curl -sL "https://github.com/CluvexStudio/Aether/releases/download/v1.2.0/aether-android-x86_64.tar.gz" -o /tmp/a.tar.gz
          mkdir -p /tmp/a && tar xzf /tmp/a.tar.gz -C /tmp/a
          find /tmp/a -type f ! -name "*.sha256" | head -1 | xargs -I{} cp {} app/src/main/jniLibs/x86_64/libaether.so
          chmod 755 app/src/main/jniLibs/x86_64/libaether.so
          echo "  x86_64: $(wc -c < app/src/main/jniLibs/x86_64/libaether.so) bytes"
          rm -rf /tmp/a /tmp/a.tar.gz

      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew assembleRelease

      - uses: actions/upload-artifact@v7
        with:
          name: aether-android-apks
          path: app/build/outputs/apk/release/*.apk
